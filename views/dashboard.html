<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NKSBOT — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo">NKSBOT</div>
  <div class="nav-right">
    <div id="userInfo" class="user-info"></div>
    <div id="adminBtn" style="display:none">
      <a href="/admin" style="padding:.4rem .9rem;border-radius:8px;border:1px solid rgba(245,158,11,.3);color:#f59e0b;font-size:.82rem;font-weight:600;">👑 Admin</a>
    </div>
    <a href="/auth/logout" class="btn-logout">Déconnexion</a>
  </div>
</nav>

<main class="container" style="padding-top:6rem;position:relative;z-index:1">
  <!-- Header -->
  <div class="page-header">
    <h1 id="greeting">Mes serveurs</h1>
    <p>Sélectionne un serveur pour le configurer</p>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="s-label">Serveurs gérés</div>
      <div class="s-val" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Bot installé</div>
      <div class="s-val" id="stat-with-bot">—</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Premium</div>
      <div class="s-val" id="stat-premium">—</div>
    </div>
  </div>

  <!-- Grille serveurs -->
  <div id="guildsGrid" class="guilds-grid">
    <div class="loading">Chargement de vos serveurs…</div>
  </div>
</main>

<script>
const BOT_CLIENT_ID = '1492591833795264642';

async function load() {
  const [me, guilds] = await Promise.all([
    fetch('/api/me').then(r=>r.json()),
    fetch('/api/guilds').then(r=>r.json())
  ]);

  // Avatar + nom
  const avatar = me.avatar
    ? `https://cdn.discordapp.com/avatars/${me.id}/${me.avatar}.png`
    : 'https://cdn.discordapp.com/embed/avatars/0.png';
  document.getElementById('userInfo').innerHTML =
    `<img src="${avatar}" class="avatar"><span>${me.username}</span>`;
  document.getElementById('greeting').textContent = `Bonjour, ${me.username} 👋`;

  // Admin btn
  if (me.isOwner) document.getElementById('adminBtn').style.display = 'block';

  // Stats
  const withBot  = guilds.filter(g=>g.botPresent).length;
  const premium  = guilds.filter(g=>g.premium).length;
  document.getElementById('stat-total').textContent    = guilds.length;
  document.getElementById('stat-with-bot').textContent = withBot;
  document.getElementById('stat-premium').textContent  = premium;
  document.getElementById('statsRow').style.display    = 'grid';

  const grid = document.getElementById('guildsGrid');
  if (!guilds.length) {
    grid.innerHTML = '<div class="empty">Aucun serveur trouvé où tu as les permissions.</div>';
    return;
  }

  grid.innerHTML = guilds.map(g => {
    const icon = g.icon
      ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png`
      : 'https://cdn.discordapp.com/embed/avatars/0.png';
    const premium = g.premium ? '<span class="badge-premium">⭐ Premium</span>' : '';
    const btn = g.botPresent
      ? `<a href="/dashboard/${g.id}" class="btn-config">⚙️ Configurer</a>`
      : `<a href="https://discord.com/oauth2/authorize?client_id=${BOT_CLIENT_ID}&permissions=8&scope=bot%20applications.commands&guild_id=${g.id}" target="_blank" class="btn-add">➕ Ajouter</a>`;
    return `
      <div class="guild-card">
        <img src="${icon}" class="guild-icon" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
        <div class="guild-info">
          <div class="guild-name">${g.name} ${premium}</div>
          <div class="guild-id">ID: ${g.id}</div>
        </div>
        ${btn}
      </div>`;
  }).join('');
}

load().catch(()=>{
  document.getElementById('guildsGrid').innerHTML = '<div class="empty">Erreur de chargement. Actualise la page.</div>';
});
</script>
</body>
</html>
