<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NKSBOT — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;color:#f1f0ff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.glow{position:fixed;top:30%;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(124,58,237,.2) 0%,transparent 70%);pointer-events:none}
.card{background:rgba(13,13,26,.9);border:1px solid rgba(124,58,237,.2);border-radius:24px;padding:3rem;text-align:center;max-width:420px;width:90%;position:relative;z-index:1}
.logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,#fff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.sub{color:#8b87b0;font-size:.9rem;margin-bottom:2.5rem}
.btn{display:flex;align-items:center;justify-content:center;gap:.8rem;background:#5865F2;color:white;padding:1rem 2rem;border-radius:12px;text-decoration:none;font-weight:600;font-size:1rem;transition:all .2s;box-shadow:0 0 30px rgba(88,101,242,.4)}
.btn:hover{background:#4752C4;transform:translateY(-2px)}
.note{margin-top:1.5rem;color:#8b87b0;font-size:.8rem}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo">NKSBOT</div>
  <p class="sub">Connecte-toi pour configurer ton serveur</p>
  <a href="/auth/discord" class="btn">🎮 Connexion avec Discord</a>
  <p class="note">🔒 Seules les infos nécessaires sont utilisées.</p>
</div>
</body>
</html>
