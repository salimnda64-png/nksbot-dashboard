<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NKSBOT — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040710;color:#e2e8f8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
.glow-1{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;filter:blur(40px)}
.glow-2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.07) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none;filter:blur(40px)}
.card{
  background:rgba(12,20,39,0.9);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:24px;
  padding:3rem 2.5rem;
  text-align:center;
  max-width:400px;width:90%;
  position:relative;z-index:1;
  backdrop-filter:blur(10px);
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:24px 24px 0 0;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),rgba(124,58,237,0.5),transparent)}
.logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
  background:linear-gradient(135deg,#fff 30%,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:0.4rem}
.sub{color:#6b7fa8;font-size:0.88rem;margin-bottom:2.2rem;line-height:1.6}
.btn-discord{
  display:flex;align-items:center;justify-content:center;gap:0.7rem;
  background:#5865F2;color:white;
  padding:0.9rem 1.8rem;border-radius:12px;
  font-weight:600;font-size:0.95rem;
  transition:all 0.2s;
  box-shadow:0 0 30px rgba(88,101,242,0.3);
  cursor:pointer;
}
.btn-discord:hover{background:#4752C4;transform:translateY(-2px);box-shadow:0 0 40px rgba(88,101,242,0.5)}
.disc-icon{font-size:1.1rem}
.note{margin-top:1.4rem;color:#35456a;font-size:0.78rem;line-height:1.5}
.back{display:inline-block;margin-top:1.2rem;color:#6b7fa8;font-size:0.82rem;transition:color 0.2s}
.back:hover{color:#e2e8f8}
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>
<div class="card">
  <div class="logo">NKSBOT</div>
  <p class="sub">Connecte-toi avec Discord pour configurer ton serveur</p>
  <a href="/auth/discord" class="btn-discord">
    <span class="disc-icon">🎮</span> Connexion avec Discord
  </a>
  <p class="note">🔒 Seules les informations nécessaires sont utilisées.<br>Aucun accès à tes messages privés.</p>
  <a href="/" class="back">← Retour à l'accueil</a>
</div>
</body>
</html>
